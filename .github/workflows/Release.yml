name: Release

# Trigger (no gh / cert needed):
#   release.bat  → tag vX.Y.Z
#   Or Actions UI → Run workflow
#
# Integrity = Nexuz.exe.sha256. Auth for upload: GITHUB_TOKEN.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty to use app_update.json)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/CI.yml

  build-and-release:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          PRERELEASE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            if [ -z "$RAW" ]; then
              RAW=$(python -c "import json; d=json.load(open('app_update.json',encoding='utf-8')); h=d.get('history') if isinstance(d,dict) else None; print((h[0].get('version','') if isinstance(h,list) and h else d.get('version','')) if isinstance(d,dict) else '')")
            fi
            RAW="${RAW#v}"
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              PRERELEASE=true
            fi
            TAG="v${RAW}"
          else
            REF="${GITHUB_REF_NAME}"
            if [[ "$REF" == v* ]]; then
              RAW="${REF#v}"
              TAG="$REF"
            else
              echo "unsupported tag: $REF" >&2
              exit 1
            fi
          fi
          if [ -z "$RAW" ]; then
            echo "version is empty — set workflow input or app_update.json version" >&2
            exit 1
          fi
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=Nexuz ${RAW}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=Nexuz-${RAW}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$RAW tag=$TAG prerelease=$PRERELEASE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build package
        env:
          NEXUZ_VERSION: ${{ steps.ver.outputs.version }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python package.py --version ${{ steps.ver.outputs.version }}

      - name: Generate SHA-256 manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path -LiteralPath "dist\Nexuz.exe")) {
            throw "dist\Nexuz.exe missing before hash step"
          }
          $hash = (Get-FileHash -LiteralPath dist\Nexuz.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *Nexuz.exe" | Set-Content -LiteralPath dist\Nexuz.exe.sha256 -Encoding ascii
          Get-Content -LiteralPath dist\Nexuz.exe.sha256
          exit 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact_name }}
          path: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          if-no-files-found: error

      - name: Build release notes from app_update.json
        id: notes
        shell: bash
        run: |
          python build_release_notes.py \
            --version "${{ steps.ver.outputs.version }}" \
            -o RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
