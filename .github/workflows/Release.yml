name: Release

# Trigger:
#   1) Edit app_update.json (version + announcement), commit & push, then:
#        gh workflow run Release.yml
#   2) Or override version:
#        gh workflow run Release.yml -f version=0.1.1
#   3) Tag push: git tag v0.1.1 && git push origin v0.1.1
#
# Auth: uses the built-in GITHUB_TOKEN — no personal public/private key needed.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty to use app_update.json)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            if [ -z "$RAW" ]; then
              RAW=$(python -c "import json; print(json.load(open('app_update.json',encoding='utf-8')).get('version',''))")
            fi
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          RAW="${RAW#v}"
          if [ -z "$RAW" ]; then
            echo "version is empty — set workflow input or app_update.json version" >&2
            exit 1
          fi
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $RAW"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pyinstaller>=6.0" "pefile"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build package
        env:
          NEXUZ_VERSION: ${{ steps.ver.outputs.version }}
        run: python package.py --version ${{ steps.ver.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexuz-${{ steps.ver.outputs.version }}
          path: dist/Nexuz.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Nexuz ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/Nexuz.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
