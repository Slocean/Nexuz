name: Release

# Trigger (no gh needed):
#   Signed:   release.bat           → tag vX.Y.Z          (requires cert secrets)
#   Unsigned: release_unsigned.bat  → tag unsigned-vX.Y.Z (skips Authenticode)
#   Or Actions UI → Run workflow
#
# Auth for Release upload: built-in GITHUB_TOKEN only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty to use app_update.json)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      skip_signing:
        description: "Skip Authenticode (dev / unsigned build)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"
      - "unsigned-v*"

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/CI.yml

  build-and-release:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          SKIP_SIGNING=false
          PRERELEASE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            if [ -z "$RAW" ]; then
              RAW=$(python -c "import json; d=json.load(open('app_update.json',encoding='utf-8')); h=d.get('history') if isinstance(d,dict) else None; print((h[0].get('version','') if isinstance(h,list) and h else d.get('version','')) if isinstance(d,dict) else '')")
            fi
            RAW="${RAW#unsigned-v}"
            RAW="${RAW#v}"
            if [ "${{ inputs.skip_signing }}" = "true" ]; then
              SKIP_SIGNING=true
              PRERELEASE=true
            fi
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              PRERELEASE=true
            fi
            if [ "$SKIP_SIGNING" = "true" ]; then
              TAG="unsigned-v${RAW}"
            else
              TAG="v${RAW}"
            fi
          else
            REF="${GITHUB_REF_NAME}"
            if [[ "$REF" == unsigned-v* ]]; then
              SKIP_SIGNING=true
              PRERELEASE=true
              RAW="${REF#unsigned-v}"
              TAG="$REF"
            elif [[ "$REF" == v* ]]; then
              RAW="${REF#v}"
              TAG="$REF"
            else
              echo "unsupported tag: $REF" >&2
              exit 1
            fi
          fi
          if [ -z "$RAW" ]; then
            echo "version is empty — set workflow input or app_update.json version" >&2
            exit 1
          fi
          if [ "$SKIP_SIGNING" = "true" ]; then
            NAME="Nexuz ${RAW} (unsigned)"
          else
            NAME="Nexuz ${RAW}"
          fi
          if [ "$SKIP_SIGNING" = "true" ]; then
            ARTIFACT="Nexuz-${RAW}-unsigned"
          else
            ARTIFACT="Nexuz-${RAW}"
          fi
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip_signing=$SKIP_SIGNING" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$RAW tag=$TAG skip_signing=$SKIP_SIGNING"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Prepare trusted signing identity
        shell: pwsh
        env:
          SKIP_SIGNING: ${{ steps.ver.outputs.skip_signing }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:SKIP_SIGNING -eq "true") {
            "NEXUZ_SIGNER_CERT_SHA256=" >> $env:GITHUB_ENV
            Write-Host "Unsigned release: leave trusted signer empty (client updates disabled)"
            return
          }
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Signed release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD. Use release_unsigned.bat for a dev build, or see docs/WINDOWS_SIGNING.md"
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $flags = [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $cert = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $bytes,
            $env:WINDOWS_CERTIFICATE_PASSWORD,
            $flags
          )
          $sha = [Security.Cryptography.SHA256]::Create()
          try {
            $fingerprint = [BitConverter]::ToString($sha.ComputeHash($cert.RawData)).Replace("-", "")
          } finally {
            $sha.Dispose()
            $cert.Dispose()
          }
          "NEXUZ_SIGNER_CERT_SHA256=$fingerprint" >> $env:GITHUB_ENV

      - name: Build package
        env:
          NEXUZ_VERSION: ${{ steps.ver.outputs.version }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python package.py --version ${{ steps.ver.outputs.version }}

      - name: Sign exe (Authenticode)
        shell: pwsh
        env:
          SKIP_SIGNING: ${{ steps.ver.outputs.skip_signing }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:SKIP_SIGNING -eq "true") {
            Write-Host "Unsigned release: skip Authenticode signing"
            return
          }
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Signed release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD. See docs/WINDOWS_SIGNING.md"
          }
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          $pfx = "certificate/certificate.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $env:WINDOWS_CERTIFICATE_FILE = (Resolve-Path $pfx).Path
          .\scripts\sign_exe.ps1 -ExePath dist\Nexuz.exe
          Remove-Item -Recurse -Force certificate -ErrorAction SilentlyContinue

      - name: Generate SHA-256 manifest
        shell: pwsh
        run: |
          $hash = (Get-FileHash -LiteralPath dist\Nexuz.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *Nexuz.exe" | Set-Content -LiteralPath dist\Nexuz.exe.sha256 -Encoding ascii
          Get-Content -LiteralPath dist\Nexuz.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact_name }}
          path: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          if-no-files-found: error

      - name: Build release notes from app_update.json
        id: notes
        shell: bash
        run: |
          python build_release_notes.py \
            --version "${{ steps.ver.outputs.version }}" \
            -o RELEASE_NOTES.md
          if [ "${{ steps.ver.outputs.skip_signing }}" = "true" ]; then
            {
              echo ""
              echo "> **Unsigned / pre-release build** — Authenticode skipped; not for production auto-update."
            } >> RELEASE_NOTES.md
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
