name: Release

# Trigger (no gh needed):
#   1) Edit app_update.json, push main, then:  release.bat
#      → creates tag v* and pushes; this workflow runs on tag push
#   2) Or manually: git tag v0.1.1 && git push origin v0.1.1
#   3) Or Actions UI → Run workflow
#
# Auth for Release upload: built-in GITHUB_TOKEN only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty to use app_update.json)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/CI.yml

  build-and-release:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            if [ -z "$RAW" ]; then
              RAW=$(python -c "import json; d=json.load(open('app_update.json',encoding='utf-8')); h=d.get('history') if isinstance(d,dict) else None; print((h[0].get('version','') if isinstance(h,list) and h else d.get('version','')) if isinstance(d,dict) else '')")
            fi
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          RAW="${RAW#v}"
          if [ -z "$RAW" ]; then
            echo "version is empty — set workflow input or app_update.json version" >&2
            exit 1
          fi
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $RAW"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pyinstaller>=6.0" "pefile"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Prepare trusted signing identity
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD. See docs/WINDOWS_SIGNING.md"
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $flags = [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $cert = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $bytes,
            $env:WINDOWS_CERTIFICATE_PASSWORD,
            $flags
          )
          $sha = [Security.Cryptography.SHA256]::Create()
          try {
            $fingerprint = [BitConverter]::ToString($sha.ComputeHash($cert.RawData)).Replace("-", "")
          } finally {
            $sha.Dispose()
            $cert.Dispose()
          }
          "NEXUZ_SIGNER_CERT_SHA256=$fingerprint" >> $env:GITHUB_ENV

      - name: Build package
        env:
          NEXUZ_VERSION: ${{ steps.ver.outputs.version }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python package.py --version ${{ steps.ver.outputs.version }}

      - name: Sign exe (Authenticode)
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD. See docs/WINDOWS_SIGNING.md"
          }
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          $pfx = "certificate/certificate.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $env:WINDOWS_CERTIFICATE_FILE = (Resolve-Path $pfx).Path
          .\scripts\sign_exe.ps1 -ExePath dist\Nexuz.exe
          Remove-Item -Recurse -Force certificate -ErrorAction SilentlyContinue

      - name: Generate SHA-256 manifest
        shell: pwsh
        run: |
          $hash = (Get-FileHash -LiteralPath dist\Nexuz.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *Nexuz.exe" | Set-Content -LiteralPath dist\Nexuz.exe.sha256 -Encoding ascii
          Get-Content -LiteralPath dist\Nexuz.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexuz-${{ steps.ver.outputs.version }}
          path: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          if-no-files-found: error

      - name: Build release notes from app_update.json
        id: notes
        shell: bash
        run: |
          python build_release_notes.py \
            --version "${{ steps.ver.outputs.version }}" \
            -o RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Nexuz ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/Nexuz.exe
            dist/Nexuz.exe.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
